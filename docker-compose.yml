version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: messenger_db
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger_user
      POSTGRES_PASSWORD: messenger_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: .
    container_name: messenger_backend
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: messenger
      DB_USER: messenger_user
      DB_PASSWORD: messenger_password
      JWT_SECRET: your_jwt_secret_key_change_this
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./Frontend:/app/Frontend
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: messenger_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf
      - ./Frontend:/usr/share/nginx/html
      - ./uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
